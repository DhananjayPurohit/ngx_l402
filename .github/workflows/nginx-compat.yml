name: Nginx Version Compatibility

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nginx_version: ["1.28.3", "1.29.8", "1.30.1", "1.31.0"]

    name: Nginx ${{ matrix.nginx_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build module for Nginx ${{ matrix.nginx_version }}
        run: |
          docker build \
            --build-arg NGX_VERSION=${{ matrix.nginx_version }} \
            -t ngx_l402:nginx-${{ matrix.nginx_version }} \
            .

      - name: Verify module loads
        run: |
          echo "Testing nginx -t (config validation with module loaded)..."
          # No --add-host: the generic image must start without the demo gRPC
          # backend being resolvable (issue #120).
          docker run --rm \
            -e LN_CLIENT_TYPE=LNURL \
            -e LNURL_ADDRESS=hello@getalby.com \
            -e ROOT_KEY=a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4 \
            ngx_l402:nginx-${{ matrix.nginx_version }} \
            nginx -t
          echo "✅ Module loaded successfully on Nginx ${{ matrix.nginx_version }}"

      - name: Verify module file exists
        run: |
          echo "Checking .so file in image..."
          docker run --rm \
            ngx_l402:nginx-${{ matrix.nginx_version }} \
            ls -lh /etc/nginx/modules/libngx_l402_lib.so
          echo "✅ .so file present"

      - name: Smoke test - module serves requests
        run: |
          echo "Starting container for smoke test..."
          # No --add-host: verifies the image boots standalone (issue #120).
          docker run -d --name smoke-test-${{ matrix.nginx_version }} \
            -p 8000:8000 \
            -e LN_CLIENT_TYPE=LNURL \
            -e LNURL_ADDRESS=hello@getalby.com \
            -e ROOT_KEY=a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4 \
            ngx_l402:nginx-${{ matrix.nginx_version }}

          echo "Waiting for nginx to start..."
          sleep 5

          # Test free route returns 200
          echo "Testing free route..."
          status_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://127.0.0.1:8000/)
          if [ "$status_code" -ne 200 ]; then
            echo "Error: Free route returned status $status_code, expected 200"
            docker logs smoke-test-${{ matrix.nginx_version }}
            exit 1
          fi
          echo "✅ Free route returned 200"

          # Test protected route returns 402
          echo "Testing protected route..."
          status_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://127.0.0.1:8000/protected)
          if [ "$status_code" -ne 402 ]; then
            echo "Error: Protected route returned status $status_code, expected 402"
            docker logs smoke-test-${{ matrix.nginx_version }}
            exit 1
          fi
          echo "✅ Protected route returned 402"

          docker stop smoke-test-${{ matrix.nginx_version }}
          docker rm smoke-test-${{ matrix.nginx_version }}

          echo "✅ Smoke test passed for Nginx ${{ matrix.nginx_version }}"

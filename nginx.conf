user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log debug;
pid        /var/run/nginx.pid;
# load module for l402
load_module /etc/nginx/modules/libngx_l402_lib.so;

events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log;
    
    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    #include /etc/nginx/conf.d/*.conf;

    # Define upstream for gRPC server
    upstream grpc-content-server {
        server grpc-content-server:50051;
    }

    server {
        # Enable HTTP/2 for gRPC support
        listen 8000;
        listen [::]:8000;
        http2 on;
        server_name _;

        # L402 protection for gRPC endpoints
        location /content.ContentService/ {
            # l402 module directives:
            l402    on;
            l402_amount_msat_default    10000;
            l402_macaroon_timeout 0;  # Macaroon validity in seconds, set to 0 to disable timeout

            # Proxy directly to gRPC server without rewrite
            grpc_pass grpc://grpc-content-server;
        }

        location / {
            root    /usr/share/nginx/html;
            index   index.html index.htm;
        }

        location /protected {
            root   /usr/share/nginx/html;
            # l402 module directives:
            l402    on;
            l402_amount_msat_default    10000;
            # Note: Dynamic pricing is handled via Redis using the request path as key
            # Example: SET /protected 15000 (sets price to 15000 msats for /protected endpoint)
            l402_macaroon_timeout 0;  # Macaroon validity in seconds, set to 0 to disable timeout
            
            # Try exact URI first, then directory index, avoid auto-redirect
            try_files $uri $uri/index.html =404;
        }

        location /protected-timeout {
            root   /usr/share/nginx/html;
            # l402 module directives:
            l402    on;
            l402_amount_msat_default    10000;
            l402_macaroon_timeout 15;  # Macaroon validity in seconds, set to 0 to disable timeout
            
            # Try exact URI first, then directory index, avoid auto-redirect
            try_files $uri $uri/index.html =404;
        }

        # Indefinite-access endpoint: a single payment grants access for the
        # lifetime of the macaroon. The same preimage can be reused repeatedly.
        location /protected-indefinite {
            root   /usr/share/nginx/html;
            l402    on;
            l402_amount_msat_default    10000;
            l402_macaroon_timeout 60;
            l402_indefinite_access on;

            try_files $uri $uri/index.html =404;
        }

        # Shadow-mode endpoint: L402 is evaluated (pricing, challenge
        # generation, structured logs, Prometheus counters) but payment is
        # NOT enforced. All requests return 200 OK regardless of the
        # Authorization header. Use this for safe production rollouts.
        location /shadow {
            root   /usr/share/nginx/html;
            l402    on;
            l402_amount_msat_default    10000;
            l402_macaroon_timeout 0;
            l402_dry_run on;

            try_files $uri $uri/index.html =404;
        }

        # Prometheus scrape endpoint. Emits `l402_*` and `l402_dry_run_*`
        # counters in text exposition format (v0.0.4).
        #
        # ⚠️ SECURITY: this endpoint is UNAUTHENTICATED and exposes operational
        # data (invoice counts, payment/error rates, client IPs). In production
        # you MUST restrict it. Uncomment and adapt the allow/deny block below
        # to your Prometheus host / monitoring subnet, or block it at the
        # firewall / reverse proxy. Example:
        #
        #     location = /metrics {
        #         allow 10.0.0.0/8;      # your monitoring subnet
        #         allow 127.0.0.1;
        #         deny  all;
        #         l402_metrics;
        #     }
        location = /metrics {
            l402_metrics;
        }

        # Capability manifest. Lets agents (and humans) discover this
        # instance's paid routes, prices, and accepted payment backends
        # via a single JSON document — the agent-era robots.txt.
        location = /.well-known/l402-services {
            l402_manifest;
        }

        # Rate-limited endpoint: only 2 invoices per minute per IP.
        # Used by the invoice rate limiting integration tests.
        location /rate-limited {
            root   /usr/share/nginx/html;
            l402    on;
            l402_amount_msat_default    10000;
            l402_macaroon_timeout 0;
            l402_invoice_rate_limit 2r/m;

            try_files $uri $uri/index.html =404;
        }

        # Auto-detect payment endpoint for integration tests.
        # Enables server-side invoice settlement lookup (no client preimage needed).
        # Supported backends: LND, CLN, Eclair.
        location /protected-auto {
            root   /usr/share/nginx/html;
            l402    on;
            l402_amount_msat_default    10000;
            l402_macaroon_timeout 0;
            l402_auto_detect_payment on;

            try_files  /index.html =404;
        }

        # Multi-tenant LNURL endpoints for testing
        location /tenant1 {
            root   /usr/share/nginx/html;
            # l402 module directives for tenant 1:
            l402    on;
            l402_amount_msat_default    10000;
            l402_macaroon_timeout 0;
            l402_lnurl_addr "hello@getalby.com";  # Tenant 1's LNURL address (external)
            
            # Try exact URI first, then directory index, avoid auto-redirect
            try_files $uri $uri/index.html =404;
        }

        location /tenant2 {
            root   /usr/share/nginx/html;
            # l402 module directives for tenant 2:
            l402    on;
            l402_amount_msat_default    10000;
            l402_macaroon_timeout 0;
            l402_lnurl_addr "test@walletofsatoshi.com";  # Tenant 2's LNURL address (external)
            
            # Try exact URI first, then directory index, avoid auto-redirect
            try_files $uri $uri/index.html =404;
        }
    }
}